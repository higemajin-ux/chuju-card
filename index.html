<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#38513a">
  <title>まいにち復習カード</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-main">
      <img class="header-title-mark" src="./img/title-card.png" alt="復習カード">
      <h1>まいにち復習カード</h1>
      <p class="today-line">今日 <strong id="dueCount">0</strong> 枚</p>
    </div>
    <span id="saveStatus" class="save-status">準備中</span>
  </header>

  <main>
    <section class="status-row" aria-label="学習状況">
      <span class="status-item">全<span id="totalCount">0</span></span>
      <span class="status-sep">|</span>
      <span class="status-item">今日<span id="dueCountInline">0</span></span>
      <span class="status-sep">|</span>
      <span class="status-item">合格<span id="graduatedCount">0</span></span>
    </section>

    <details class="rule-panel">
      <summary>ルール</summary>
      <div class="rule-body">
        <p>○ わかった：7日後に復習</p>
        <p>△ もう一回：3日後に復習</p>
        <p>× わからない：明日復習</p>
        <p>直近5回中4回以上正解で合格</p>
      </div>
    </details>

    <section class="panel study-panel" aria-label="学習カード">
      <div class="study-top">
        <div>
          <h2>学習カード</h2>
          <p id="cardMeta" class="meta">CSVを読み込んでください</p>
        </div>
        <button id="nextCardBtn" class="small-button secondary-button" type="button">次のカード</button>
      </div>

      <article id="cardBox" class="card-box empty">
        <div class="card-tags" aria-label="カード情報">
          <span id="subjectTag" class="card-tag hidden"></span>
          <span id="unitTag" class="card-tag hidden"></span>
          <span id="difficultyTag" class="card-tag hidden"></span>
          <span id="checkBadge" class="check-badge hidden"></span>
        </div>
        <img id="studyEmptyImage" class="empty-state-image study-empty-image hidden" src="./img/empty-state-card.png" alt="カードなし">
        <p id="questionText" class="question-text">まだカードがありません。</p>
        <div id="questionImageWrap" class="question-image-wrap hidden">
          <img id="questionImageEl" class="question-image hidden" alt="">
          <p id="questionImageMissingText" class="question-image-missing hidden"></p>
        </div>
        <div id="answerArea" class="answer-area hidden">
          <p class="answer-label">答え</p>
          <p id="answerText" class="answer-text"></p>
          <p id="explanationText" class="explanation-text"></p>
        </div>
        <p id="checkReasonText" class="check-reason hidden"></p>
        <p id="sourceText" class="source-text hidden"></p>
      </article>

      <div class="study-actions">
        <button id="showAnswerBtn" class="big-button primary answer-button" type="button">答えを見る</button>
      </div>

      <div class="judge-actions" aria-label="理解度を記録">
        <button id="markGoodBtn" class="judge-button good" type="button">○ わかった</button>
        <button id="markMaybeBtn" class="judge-button maybe" type="button">△ もう一回</button>
        <button id="markBadBtn" class="judge-button bad" type="button">× わからない</button>
      </div>
    </section>

    <section class="panel list-panel" aria-label="カード一覧">
      <div class="list-top">
        <div>
          <h2>カード一覧</h2>
          <p class="hint">選ぶとそのカードへ切り替わります。</p>
        </div>
      </div>
      <div id="cardList" class="card-list"></div>
    </section>

    <details class="panel data-panel">
      <summary>データ管理</summary>
      <p class="hint">CSV読み込みやバックアップは保護者向けの操作です。</p>
      <div class="data-grid">
        <label class="big-button primary file-label">
          <span>教材を追加</span>
          <span class="file-label-subtext">CSV・ZIP・画像を読み込みます</span>
          <input id="importInput" type="file" accept=".csv,.zip,.jpg,.jpeg,.png,.webp,text/csv,application/zip,image/jpeg,image/png,image/webp" multiple>
        </label>
        <button id="exportJsonBtn" class="big-button secondary-button" type="button">JSONバックアップ</button>
        <label class="big-button file-label">
          JSON復元
          <input id="jsonInput" type="file" accept="application/json,.json">
        </label>
      </div>
      <p id="imageImportStatus" class="hint data-upload-status hidden"></p>
      <div class="data-footer">
        <button id="clearAllBtn" class="quiet-button" type="button">この端末の学習記録を削除</button>
      </div>
    </details>
  </main>

  <template id="cardListItemTemplate">
    <button class="list-item" type="button">
      <span class="list-history" aria-hidden="true"></span>
      <span class="list-title"></span>
      <span class="list-sub"></span>
      <span class="list-check check-badge hidden"></span>
    </button>
  </template>

  <script src="./lib/jszip.min.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
